{% extends "apps/erplora-site/_landing.jinja" %}

{% block title %}Sign in · ERPlora{% endblock %}
{% block page_title %}Sign in · ERPlora{% endblock %}

{% block landing_content %}
<main>
<PageHero
  eyebrow_icon="lucide:user"
  title="Welcome back"
  subtitle="Sign in to your ERPlora Hub."
  back_href="index.html" />

<section style="padding-top:0">
  <div class="container" style="max-width:480px">
    <form class="form-card" onsubmit="event.preventDefault();alert('Demo — auth captured.');">

      <Field label="Email" required>
        <Input name="email" type="email" placeholder="you@example.com" required />
      </Field>
      <Field label="Password" required>
        <Input name="password" type="password" placeholder="••••••••" required />
      </Field>
      <Button label="Sign In" type="submit" variant="brand" size="lg" block />
      <div style="text-align:center;margin-top:var(--space-5);font-size:var(--text-sm);color:var(--ink-3)">
        or continue with
      </div>
      <div class="grid-2" style="gap:8px;margin-top:var(--space-3)">
        <button type="button" class="btn btn-outline btn-full" onclick="event.preventDefault();">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8c1.8-4.4 6.2-7.5 11.1-7.5 3.1 0 5.9 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2.1 1.4-4.6 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.2 5.2C40.4 35.2 44 30 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
          Google
        </button>
        <button type="button" class="btn btn-outline btn-full" onclick="event.preventDefault();">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.365 1.43c0 1.14-.46 2.2-1.23 2.96-.78.78-2.02 1.4-3.1 1.31-.13-1.1.41-2.24 1.16-2.97.77-.75 2.01-1.3 3.17-1.3zM20.9 17.78c-.49 1.13-1.06 2.18-1.74 3.16-.93 1.34-2.25 3-3.88 3-1.45 0-1.82-.94-3.79-.92-1.96 0-2.36.92-3.81.92-1.63 0-2.88-1.5-3.81-2.83-2.6-3.72-2.88-8.08-1.27-10.4 1.14-1.64 2.95-2.6 4.66-2.6 1.74 0 2.84.96 4.26.96 1.38 0 2.22-.95 4.21-.95 1.51 0 3.11.83 4.26 2.27-3.74 2.05-3.13 7.41 1.91 7.39z"/></svg>
          Apple
        </button>
      </div>
      <p style="text-align:center;margin-top:var(--space-5);font-size:var(--text-sm);color:var(--ink-3)">
        Don't have an account? Sign up <a href="signup.html" style="color:var(--brand)">→</a>
      </p>
    </form>
  </div>
</section></main>
{% endblock %}
