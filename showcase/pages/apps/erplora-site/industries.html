{% extends "apps/erplora-site/_landing.jinja" %}

{% block title %}Industries · ERPlora{% endblock %}
{% block page_title %}Industries · ERPlora{% endblock %}

{% block landing_content %}

<main>
<PageHero
  eyebrow_icon="lucide:briefcase"
  title="ERPlora for Your Industry"
  subtitle="Pre-tuned configurations for the businesses we know best. Click any to see the modules and workflows we recommend."
  back_href="index.html" />

<section style="padding-top:0">
  <div class="container">
    <div class="grid-3 center-wide">
      <FeatureCard
        title="Retail &amp; shops"
        subtitle="POS, inventory, multi-store, loyalty, e-receipts"
        icon="lucide:home"
        icon_kind="brand"
        href="solutions.html" />
      <FeatureCard
        title="Restaurants &amp; bars"
        subtitle="Table service, kitchen display, reservations, delivery"
        icon="lucide:utensils"
        icon_kind="brand"
        href="solutions.html" />
      <FeatureCard
        title="Professional services"
        subtitle="Quotes, projects, time tracking, recurring invoicing"
        icon="lucide:file-text"
        icon_kind="brand"
        href="solutions.html" />
      <FeatureCard
        title="Beauty &amp; wellness"
        subtitle="Appointments, packages, loyalty, employee shifts"
        icon="lucide:user-check"
        icon_kind="brand"
        href="solutions.html" />
      <FeatureCard
        title="Logistics &amp; delivery"
        subtitle="Route planning, driver app, proof of delivery, tracking"
        icon="lucide:clock"
        icon_kind="brand"
        href="solutions.html" />
      <FeatureCard
        title="Manufacturing"
        subtitle="BOM, work orders, MRP, quality, traceability"
        icon="lucide:wrench"
        icon_kind="brand"
        href="solutions.html" />
      <FeatureCard
        title="E-commerce"
        subtitle="Online store, marketplace sync, fulfillment, returns"
        icon="lucide:globe"
        icon_kind="brand"
        href="solutions.html" />
      <FeatureCard
        title="Automotive &amp; service"
        subtitle="Job cards, parts, labor, customer history, scheduling"
        icon="lucide:car"
        icon_kind="brand"
        href="solutions.html" />
      <FeatureCard
        title="Real estate"
        subtitle="Listings, contracts, payments, owner portals"
        icon="lucide:building-2"
        icon_kind="brand"
        href="solutions.html" />
    </div>

    <div class="mt-12" style="margin-top:var(--space-9)">
      <BenefitCard
        title="Don't see your industry?"
        subtitle="ERPlora is built to adapt. Tell us about your operation and we'll suggest the right modules — or build the missing one."
        cta_label="Tell us about your business"
        cta_href="contact.html" />
    </div>
  </div>
</section></main>
{% endblock %}
