name: Publish outfitkit to PyPI

on:
  push:
    tags: ["pypi-v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/outfitkit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel from /tmp (avoids local build.py shadow)
        run: |
          python -m build \
            --outdir "$GITHUB_WORKSPACE/showcase/dist" \
            "$GITHUB_WORKSPACE/showcase"

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: showcase/dist
