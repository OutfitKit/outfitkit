name: Build CSS bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install rcssmin (pure-Python minifier)
        run: pip install rcssmin==1.1.2

      - name: Bundle CSS (resolve @imports)
        run: |
          mkdir -p dist
          python <<'PY'
          import re
          from pathlib import Path

          IMPORT_RE = re.compile(r'^\s*@import\s+["\'](?P<path>[^"\']+)["\'];\s*$', re.M)
          ROOT = Path("css")

          def expand(file: Path, seen: set[Path]) -> str:
              if file in seen:
                  return ""
              seen.add(file)
              src = file.read_text()

              def repl(m: re.Match) -> str:
                  rel = m.group("path")
                  target = (file.parent / rel).resolve()
                  return f"\n/* === {target.relative_to(Path.cwd())} === */\n" + expand(target, seen)

              return IMPORT_RE.sub(repl, src)

          bundled = expand(ROOT / "outfitkit.css", set())
          Path("dist/outfitkit.css").write_text(bundled)
          print(f"Wrote dist/outfitkit.css ({len(bundled):,} bytes)")
          PY

      - name: Minify
        run: |
          python <<'PY'
          import rcssmin
          from pathlib import Path
          src = Path("dist/outfitkit.css").read_text()
          minified = rcssmin.cssmin(src)
          Path("dist/outfitkit.min.css").write_text(minified)
          print(f"Wrote dist/outfitkit.min.css ({len(minified):,} bytes, {len(minified)/len(src)*100:.1f}% of source)")
          PY

      - name: Verify outputs
        run: |
          test -s dist/outfitkit.css
          test -s dist/outfitkit.min.css
          ls -lh dist/

      - name: Commit dist/ to the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet dist/; then
            echo "No changes in dist/, skipping commit."
            exit 0
          fi
          git add dist/
          git commit -m "build: dist for ${{ github.ref_name }}"
          git tag -f ${{ github.ref_name }}
          git push origin HEAD:refs/tags/${{ github.ref_name }} --force
