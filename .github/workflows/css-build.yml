name: Build CSS bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install rcssmin (pure-Python minifier)
        run: pip install rcssmin==1.1.2

      - name: Bundle CSS (resolve @imports)
        run: |
          mkdir -p dist
          python <<'PY'
          import re
          from pathlib import Path

          IMPORT_RE = re.compile(r'^\s*@import\s+["\'](?P<path>[^"\']+)["\'];\s*$', re.M)
          ROOT = Path("css")

          def expand(file: Path, seen: set[Path]) -> str:
              if file in seen:
                  return ""
              seen.add(file)
              src = file.read_text()

              def repl(m: re.Match) -> str:
                  rel = m.group("path")
                  target = (file.parent / rel).resolve()
                  return f"\n/* === {target.relative_to(Path.cwd())} === */\n" + expand(target, seen)

              return IMPORT_RE.sub(repl, src)

          # The source under css/ is written with the `ok-` prefix throughout.
          # We bundle it as-is into the "ok" variant, then derive the default
          # (unprefixed) bundle by stripping `.ok-` from selectors only.
          bundled_ok = expand(ROOT / "outfitkit.css", set())
          Path("dist/outfitkit.ok.css").write_text(bundled_ok)
          print(f"Wrote dist/outfitkit.ok.css ({len(bundled_ok):,} bytes)")
          PY

      - name: Generate default (unprefixed) bundle
        run: |
          python <<'PY'
          import re
          from pathlib import Path

          # Strip `ok-` from BOTH selectors AND custom-property tokens. Does NOT touch:
          #   @keyframes ok-*    (animation names — safe identifier prefix)
          #   animation: ok-*    (animation references)
          #   animation-name: ok-*
          # Keyframes keep the prefix because they're not user-facing in the
          # consumer's stylesheet — and renaming them risks colliding with any
          # `@keyframes spin` or `@keyframes pulse` the consumer may have defined.
          src = Path("dist/outfitkit.ok.css").read_text()

          # Step 1: strip `.ok-` from class selectors.
          stripped = re.sub(r'\.ok-(?=[a-zA-Z])', '.', src)

          # Step 2: strip `--ok-` from custom-property names AND var() references.
          # This catches both `--ok-foo: value;` (definitions) and
          # `var(--ok-foo)` (references). Pattern: literal `--ok-` followed by
          # a class-name character.
          stripped = re.sub(r'--ok-(?=[a-zA-Z])', '--', stripped)

          # The default (unprefixed) bundle is the canonical file name.
          out = Path("dist/outfitkit.css")
          out.write_text(stripped)

          # Sanity checks: keyframe/animation names keep their prefix.
          assert "@keyframes ok-" in stripped, "lost @keyframes ok-* (BUG)"
          # Every .ok- class selector should be gone, EXCEPT inside CSS comments
          # (which are human-readable text, not browser-parsed). Strip /* ... */
          # before checking.
          no_comments = re.sub(r'/\*.*?\*/', '', stripped, flags=re.S)
          assert ".ok-" not in no_comments, f"selectors still have .ok- prefix: {no_comments[no_comments.find('.ok-'):no_comments.find('.ok-')+80]!r}"
          assert "--ok-" not in no_comments, f"tokens still have --ok- prefix: {no_comments[no_comments.find('--ok-'):no_comments.find('--ok-')+80]!r}"

          print(f"Wrote dist/outfitkit.css ({len(stripped):,} bytes)")
          PY

      - name: Minify both bundles
        run: |
          python <<'PY'
          import rcssmin
          from pathlib import Path
          # outfitkit.css         = default (unprefixed)
          # outfitkit.ok.css      = opt-in, prefixed with "ok-"
          for name in ("outfitkit", "outfitkit.ok"):
              src = Path(f"dist/{name}.css").read_text()
              minified = rcssmin.cssmin(src)
              Path(f"dist/{name}.min.css").write_text(minified)
              print(f"Wrote dist/{name}.min.css ({len(minified):,} bytes, {len(minified)/len(src)*100:.1f}% of source)")
          PY

      - name: Verify outputs
        run: |
          test -s dist/outfitkit.css
          test -s dist/outfitkit.min.css
          test -s dist/outfitkit.ok.css
          test -s dist/outfitkit.ok.min.css
          ls -lh dist/

      - name: Commit dist/ to the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          if git diff --cached --quiet; then
            echo "No staged changes — dist/ already matches the tag."
            exit 0
          fi
          git commit -m "build: dist for ${{ github.ref_name }}"
          git tag -f ${{ github.ref_name }}
          git push origin HEAD:refs/tags/${{ github.ref_name }} --force
