name: Visual regression

on:
  pull_request:
    paths:
      - 'css/**'
      - 'showcase/**'
      - '.github/workflows/visual-regression.yml'
  workflow_dispatch:

# A new push to the same PR cancels the previous run.
concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    name: Playwright screenshot diff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: showcase/tests/visual
    env:
      # NOTE: CI targets the deployed showcase, not the PR's HEAD.
      # Visual changes introduced by this PR will only be exercised
      # *after* `pages.yml` deploys them (i.e. post-merge). Run the
      # suite locally with OUTFITKIT_BASE_URL=http://localhost:8000
      # before merging UI changes.
      OUTFITKIT_BASE_URL: https://outfitkit.github.io/outfitkit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: showcase/tests/visual/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright (chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: showcase/tests/visual/playwright-report
          retention-days: 14

      - name: Upload diff artifacts (test-results)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: showcase/tests/visual/test-results
          retention-days: 14
